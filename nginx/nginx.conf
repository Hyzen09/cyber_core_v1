events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    keepalive_timeout  65;

    # SSL Settings
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server {
        listen 80;
        server_name cyber-studio.duckdns.org;

        # Allow Certbot to authenticate via webroot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name cyber-studio.duckdns.org;

        # SSL Certificates (managed by Certbot)
        ssl_certificate /etc/letsencrypt/live/cyber-studio.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cyber-studio.duckdns.org/privkey.pem;

        # Route /api/ traffic to Python Backend
        location /api/ {
            proxy_pass http://cyber_core_backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route everything else to Next.js Frontend
        location / {
            proxy_pass http://cyber_core_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CRITICAL FOR CHAT STREAMING: Disables Nginx buffering so SSE chunks pass instantly
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
