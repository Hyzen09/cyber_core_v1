
services:
  # 1. The Next.js Frontend
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "https://zuswmcqwudybxbpxcoaw.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_tE5-ptTYbqH2Q9s87JvQiQ_P8HNltYq"
    container_name: cyber_core_frontend
    restart: always
    # Removed exposed ports; Nginx routes traffic internally
    environment:
      # SECURED: Internal docker network to connect to backend
      - INTERNAL_API_URL=http://backend:8000
      # UPDATED: Routes through your secure Nginx domain
      - NEXT_PUBLIC_API_URL=https://cyber-studio.duckdns.org
    depends_on:
      - backend
    networks:
      - cyber_net

  # 2. The FastAPI Backend
  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_core_backend
    restart: always
    # Removed exposed ports; Nginx routes traffic internally
    environment:
      - QDRANT_HOST=cyber_core_qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://cyber_core_qdrant:6333
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
    networks:
      - cyber_net

  # 3. Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cyber_core_qdrant
    restart: always
    ports:
      # UPDATED: Allows external traffic via load balancer or direct IP
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    networks:
      - cyber_net

  # 4. Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cyber_core_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - cyber_net
    depends_on:
      - frontend
      - backend

  # 5. Certbot (Let's Encrypt)
  certbot:
    image: certbot/certbot
    container_name: cyber_core_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"


networks:
  cyber_net:
    driver: bridge

volumes:
  certbot_conf:
  certbot_www: