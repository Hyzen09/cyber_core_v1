version: '3.8'

services:
  # 1. The Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "https://zuswmcqwudybxbpxcoaw.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_tE5-ptTYbqH2Q9s87JvQiQ_P8HNltYq"
    container_name: cyber_core_frontend
    restart: always
    ports:
      # SECURED: Binds strictly to localhost
      - "127.0.0.1:3000:3000"
    environment:
      # UPDATED: Routes through your secure Caddy domain
      - NEXT_PUBLIC_API_URL=https://cyber-studio.duckdns.org/api
    depends_on:
      - backend
    networks:
      - cyber_net

  # 2. The FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_core_backend
    restart: always
    ports:
      # SECURED: Binds strictly to localhost
      - "127.0.0.1:8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
      - ollama
    networks:
      - cyber_net

  # 3. Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cyber_core_qdrant
    restart: always
    ports:
      # SECURED: Binds strictly to localhost
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    networks:
      - cyber_net

  # 4. Ollama LLM Server
  ollama:
    image: ollama/ollama:latest
    container_name: cyber_core_ollama
    restart: always
    ports:
      # SECURED: Binds strictly to localhost
      - "127.0.0.1:11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
    networks:
      - cyber_net

  # 5. Ollama Model Puller (Auto-Initialization)
  ollama-puller:
    image: curlimages/curl:latest
    container_name: cyber_core_ollama_puller
    restart: "no"
    depends_on:
      - ollama
    networks:
      - cyber_net
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Ollama to be ready...';
      while ! curl -s http://ollama:11434/api/tags > /dev/null; do
        sleep 5;
      done;
      echo 'Pulling nomic-embed-text...';
      curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}';
      echo 'Pulling qwen2.5-coder:1.5b...';
      curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5-coder:1.5b\"}';
      echo 'Models pulled successfully!';
      "

networks:
  cyber_net:
    driver: bridge